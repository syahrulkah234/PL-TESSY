<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <style>
    body { font-family: Arial; }
    #menu button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th { background: #eee; }
  </style>
</head>
<body>

<h2>Daftar Harga</h2>

<div id="menu">Loading menu...</div>

<input type="text" id="search" placeholder="Cari produk...">

<table>
  <thead>
    <tr>
      <th>Produk</th>
      <th>Tebal</th>
      <th>Harga</th>
      <th>Satuan</th>
    </tr>
  </thead>
  <tbody id="tabel"></tbody>
</table>

<script>
const sheetID = "1RIZxMJx3wsVJmWyhdTSv72JMRTQ4_am5MAAiDU9ss4U";
let currentData = [];

// LOAD MENU DARI SHEET "kategori"
fetch(`https://opensheet.elk.sh/${sheetID}/kategori`)
  .then(res => res.json())
  .then(data => {
    let menuHTML = "";

    data.forEach(item => {
      // mapping manual dari Kategori ke nama sheet
      let sheetMap = {
        "Metalan": "PL METALAN",
        "Besi Beton Wiremesh": "PL BESI BETON",
        "Hollow Eco": "PL HOLLOW",
        "Besi Eco": "PL BESI",
        "Pipa Eco": "PL PIPA",
        "BRC": "PL BRC",
        "Geosintetis": "PL GEOSINTETIS"
      };

      let namaSheet = sheetMap[item.Kategori];

      menuHTML += `<button onclick="loadSheet('${namaSheet}')">
        ${item.Kategori}
      </button>`;
    });

    document.getElementById("menu").innerHTML = menuHTML;

    if (data.length > 0) {
      loadSheet(sheetMap[data[0].Kategori]);
    }
  });
  .catch(() => {
    document.getElementById("menu").innerHTML = "Gagal load menu";
  });

// LOAD DATA PER SHEET
function loadSheet(namaSheet) {
  document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  fetch(`https://opensheet.elk.sh/${sheetID}/${namaSheet}`)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      tampilkan(data);
    })
    .catch(() => {
      document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Gagal load data</td></tr>";
    });
}

// TAMPILKAN DATA
function tampilkan(data) {
  let html = "";

  data.forEach(item => {
    html += `<tr>
      <td>${item.produk || ""}</td>
      <td>${item.tebal || ""}</td>
      <td>${formatRupiah(item.harga)}</td>
      <td>${item.satuan || ""}</td>
    </tr>`;
  });

  document.getElementById("tabel").innerHTML = html;
}

// FORMAT RUPIAH
function formatRupiah(angka) {
  if (!angka) return "";
  return "Rp " + Number(angka).toLocaleString("id-ID");
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let keyword = this.value.toLowerCase();

  let hasil = currentData.filter(item =>
    (item.produk || "").toLowerCase().includes(keyword)
  );

  tampilkan(hasil);
});
</script>

</body>
</html>
