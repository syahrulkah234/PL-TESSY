<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <style>
    body { font-family: Arial; }
    #menu button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th { background: #eee; }
  </style>
</head>
<body>

<h2>Daftar Harga</h2>

<div id="menu">Loading menu...</div>

<input type="text" id="search" placeholder="Cari produk...">

<table>
  <thead>
    <tr>
      <th>Produk</th>
      <th>Tebal</th>
      <th>Harga</th>
      <th>Satuan</th>
    </tr>
  </thead>
  <tbody id="tabel"></tbody>
</table>

<script>
const sheetID = "1m-MFmrKUysTBYDmXAP5JqZoChLIa0Rd99d4nO1yH6RE";
let currentData = [];

// ================= MENU =================
fetch(`https://opensheet.elk.sh/${sheetID}/kategori`)
  .then(res => res.json())
  .then(data => {
    let menuHTML = "";

    data.forEach(item => {
      let namaSheet = item.nama_sheet;
      let label = item.label;

      if (!namaSheet) return;

      menuHTML += `<button onclick="loadSheet('${namaSheet}')">
        ${label}
      </button>`;
    });

    document.getElementById("menu").innerHTML = menuHTML;

    // default load
    if (data.length > 0) {
      loadSheet(data[0].nama_sheet);
    }
  })
  .catch(() => {
    document.getElementById("menu").innerHTML = "Gagal load menu";
  });

// ================= LOAD DATA =================
function loadSheet(namaSheet) {
  document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  fetch(`https://opensheet.elk.sh/${sheetID}/${namaSheet}`)
    .then(res => res.json())
    .then(data => {
      console.log("DATA:", data);
      currentData = data;
      tampilkan(data);
    })
    .catch(() => {
      document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Gagal load data</td></tr>";
    });
}

// ================= DETEKSI KOLOM OTOMATIS =================
function getValue(item, keywords) {
  for (let key in item) {
    let cleanKey = key.toLowerCase().trim();
    for (let k of keywords) {
      if (cleanKey.includes(k)) {
        return item[key];
      }
    }
  }
  return "";
}

// ================= TAMPILKAN =================
function tampilkan(data) {
  let html = "";

  if (!data || data.length === 0) {
    html = "<tr><td colspan='4'>Data kosong</td></tr>";
  } else {
    data.forEach(item => {

      let produk = getValue(item, ["produk", "nama"]);
      let tebal  = getValue(item, ["tebal", "ukuran"]);
      let harga  = getValue(item, ["harga", "price"]);
      let satuan = getValue(item, ["satuan", "unit"]);

      html += `<tr>
        <td>${produk}</td>
        <td>${tebal}</td>
        <td>${formatRupiah(harga)}</td>
        <td>${satuan}</td>
      </tr>`;
    });
  }

  document.getElementById("tabel").innerHTML = html;
}

// ================= FORMAT RUPIAH =================
function formatRupiah(angka) {
  if (!angka) return "";
  angka = String(angka).replace(/[^0-9]/g, "");
  return "Rp " + Number(angka).toLocaleString("id-ID");
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("keyup", function() {
  let keyword = this.value.toLowerCase();

  let hasil = currentData.filter(item => {
    let produk = getValue(item, ["produk", "nama"]).toLowerCase();
    return produk.includes(keyword);
  });

  tampilkan(hasil);
});
</script>

</body>
</html>
