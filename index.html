<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricelist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      font-size: 14px;
      background: #f9f9f9;
      overflow-x: hidden;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    /* MENU */
    #menu {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 5px;
    }

    #menu button {
      flex: 0 0 auto;
      padding: 8px 12px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      font-size: 13px;
    }

    #menu button.active {
      background: #28a745;
    }

    /* SEARCH */
    #search {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    /* TABLE */
    .table-wrapper {
      width: 100%;
      overflow-x: hidden;
    }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 6px;
      font-size: 13px;
      line-height: 1.3;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: #eee;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    /* PEMBAGIAN KOLOM */
    td:nth-child(1), th:nth-child(1) { width: 45%; font-weight: 600; }
    td:nth-child(2), th:nth-child(2) { width: 20%; }
    td:nth-child(3), th:nth-child(3) { width: 20%; font-weight: bold; color: #007b00; }
    td:nth-child(4), th:nth-child(4) { width: 15%; }
  </style>
</head>

<body>

<h2>Daftar Harga</h2>

<div id="menu">Loading menu...</div>

<input type="text" id="search" placeholder="Cari produk...">

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Produk</th>
        <th>Tebal</th>
        <th>Harga</th>
        <th>Satuan</th>
      </tr>
    </thead>
    <tbody id="tabel"></tbody>
  </table>
</div>

<script>
const sheetID = "1m-MFmrKUysTBYDmXAP5JqZoChLIa0Rd99d4nO1yH6RE";
let currentData = [];

// MENU
fetch(`https://opensheet.elk.sh/${sheetID}/kategori`)
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.forEach(item => {
      html += `<button onclick="loadSheet('${item.nama_sheet}', this)">
        ${item.label}
      </button>`;
    });

    document.getElementById("menu").innerHTML = html;

    if (data.length > 0) {
      loadSheet(data[0].nama_sheet);
    }
  });

// LOAD DATA
function loadSheet(namaSheet, btn) {
  document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  if (btn) {
    document.querySelectorAll("#menu button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  fetch(`https://opensheet.elk.sh/${sheetID}/${namaSheet}`)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      tampilkan(data);
    })
    .catch(() => {
      document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Gagal load data</td></tr>";
    });
}

// AMBIL DATA KOLOM
function getValue(item, keys) {
  for (let key in item) {
    let k = key.toLowerCase();
    for (let x of keys) {
      if (k.includes(x)) return item[key];
    }
  }
  return "";
}

// FORMAT ANGKA (TANPA RP)
function formatHarga(angka) {
  if (!angka) return "";
  angka = String(angka).replace(/[^0-9]/g, "");
  return Number(angka).toLocaleString("id-ID");
}

// TAMPILKAN
function tampilkan(data) {
  let html = "";

  if (!data.length) {
    html = "<tr><td colspan='4'>Data kosong</td></tr>";
  } else {
    data.forEach(item => {
      let produk = getValue(item, ["produk", "nama"]);
      let tebal  = getValue(item, ["tebal", "ukuran"]);
      let harga  = getValue(item, ["harga"]);
      let satuan = getValue(item, ["satuan"]);

      html += `<tr>
        <td>${produk}</td>
        <td>${tebal}</td>
        <td>${formatHarga(harga)}</td>
        <td>${satuan}</td>
      </tr>`;
    });
  }

  document.getElementById("tabel").innerHTML = html;
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let key = this.value.toLowerCase();

  let hasil = currentData.filter(item => {
    let produk = getValue(item, ["produk", "nama"]).toLowerCase();
    return produk.includes(key);
  });

  tampilkan(hasil);
});
</script>

</body>
</html>
