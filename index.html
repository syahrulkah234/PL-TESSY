<!DOCTYPE html>
<html>
<head>
  <title>Pricelist</title>
  <style>
    body { font-family: Arial; }
    #menu button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th { background: #eee; }
  </style>
</head>
<body>

<h2>Daftar Harga</h2>

<div id="menu">Loading menu...</div>

<input type="text" id="search" placeholder="Cari produk...">

<table>
  <thead>
    <tr>
      <th>produk</th>
      <th>tebal</th>
      <th>harga</th>
      <th>satuan</th>
    </tr>
  </thead>
  <tbody id="tabel"></tbody>
</table>

<script>
const sheetID = "1m-MFmrKUysTBYDmXAP5JqZoChLIa0Rd99d4nO1yH6RE";
let currentData = [];

// LOAD MENU DARI SHEET "kategori"
fetch(`https://opensheet.elk.sh/${sheetID}/kategori`)
  .then(res => res.json())
  .then(data => {
    let menuHTML = "";

    data.forEach(item => {
      menuHTML += `<button onclick="loadSheet('${item.nama_sheet}')">
        ${item.label}
      </button>`;
    });

    document.getElementById("menu").innerHTML = menuHTML;

    // load pertama
    if (data.length > 0) {
      loadSheet(data[0].nama_sheet);
    }
  })
  .catch(() => {
    document.getElementById("menu").innerHTML = "Gagal load menu";
  });

// LOAD DATA PER SHEET
function loadSheet(namaSheet) {
  document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  fetch(`https://opensheet.elk.sh/${sheetID}/${namaSheet}`)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      tampilkan(data);
    })
    .catch(() => {
      document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Gagal load data</td></tr>";
    });
}

// TAMPILKAN DATA
function tampilkan(data) {
  let html = "";

  console.log("DATA:", data); // debug

  if (!data || data.length === 0) {
    html = "<tr><td colspan='4'>Data kosong</td></tr>";
  } else {
    data.forEach(item => {
      html += `<tr>
        <td>${item.produk || item.Produk || item["Produk "] || ""}</td>
        <td>${item.tebal || item.Tebal || ""}</td>
        <td>${formatRupiah(item.harga || item.Harga)}</td>
        <td>${item.satuan || item.Satuan || ""}</td>
      </tr>`;
    });
  }

  document.getElementById("tabel").innerHTML = html;
}

// FORMAT RUPIAH
function formatRupiah(angka) {
  if (!angka) return "";
  return "Rp " + Number(angka).toLocaleString("id-ID");
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let keyword = this.value.toLowerCase();

  let hasil = currentData.filter(item =>
    (item.produk || "").toLowerCase().includes(keyword)
  );

  tampilkan(hasil);
});
</script>

</body>
</html>
